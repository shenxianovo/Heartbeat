name: Release Desktop

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - rid: win-x64
            arch: x64
          - rid: win-arm64
            arch: arm64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: |
          dotnet publish desktop/Heartbeat.WPF/Heartbeat.WPF.csproj `
            -c Release `
            -r ${{ matrix.rid }} `
            --self-contained `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ steps.version.outputs.version }} `
            -o publish

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Pack with Velopack
        run: |
          vpk pack `
            --packId Heartbeat `
            --packVersion ${{ steps.version.outputs.version }} `
            --packDir publish `
            --mainExe Heartbeat.WPF.exe `
            --runtime ${{ matrix.rid }} `
            --channel ${{ matrix.rid }} `
            --outputDir releases

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: releases-${{ matrix.arch }}
          path: releases/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-releases
          merge-multiple: true

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
          else
            RANGE="${GITHUB_REF_NAME}"
          fi
          {
            echo "body<<NOTES_EOF"
            echo "## What's New"
            echo ""
            git log --pretty=format:"- %s" "$RANGE"
            echo ""
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: all-releases/*
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
