# Heartbeat frontend container: serves the SPA and reverse-proxies API
# traffic to the backend container on the compose network.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS. Using a variable in proxy_pass forces per-request
    # resolution, so a backend restart (new IP) doesn't strand a stale upstream.
    resolver 127.0.0.11 valid=10s;
    set $backend http://backend:8080;

    location /api/ {
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
